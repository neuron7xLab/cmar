name: Daily Truth Stats
on:
  schedule:
    - cron: "17 6 * * *"   # once a day, ~06:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-stats
  cancel-in-progress: false

jobs:
  stats:
    runs-on: ubuntu-latest
    env:
      # CMAR_PAT (fine-grained PAT with repo + security_events) unlocks private
      # repos and cross-repo vulnerability data; falls back to the scoped token.
      GH_TOKEN: ${{ secrets.CMAR_PAT || secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e .
      - name: Compute and inject truth stats
        run: python scripts/update_readme_stats.py neuron7xLab 30
      - name: Commit refreshed README
        run: |
          if ! git diff --quiet README.md; then
            git config user.name "cmar-stats-bot"
            git config user.email "actions@users.noreply.github.com"
            git add README.md
            git commit -m "chore(stats): daily truth-stats refresh [skip ci]"
            git push
          else
            echo "no stats change"
          fi
